# macro_placement.cfg
# Explicit placement constraints for OpenROAD floorplan.
# Format: <instance_name> <llx_um> <lly_um> <orientation>
#
# NOTE: Instance names MUST match exactly as used in system.v
#       These positions match MACROS.instances.location in config.json
#
# Spread floorplan for 6500um x 6500um die:
# - app SRAM banks on the left, vertically separated
# - boot SRAM lower-left, away from the app SRAM column
# - CPU near center-left to stay reasonably close to SRAM
# - crypto macros distributed around CPU to open routing channels
cu_boot_sram                              450.00   1200.00  N
u_app_sram.gen_bank[0].u_bank            450.00   4200.00  N
u_app_sram.gen_bank[1].u_bank            450.00   3600.00  N
u_app_sram.gen_bank[2].u_bank            450.00   3000.00  N
u_app_sram.gen_bank[3].u_bank            450.00   2400.00  N
u_giftcofb                              4700.00   1200.00  N
u_xoodyak                               4700.00   4300.00  N
u_jambu                                 1800.00   5000.00  N
cpu                                     2900.00   3000.00  N
